name: Deploy Life Compass to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build web
        run: npx expo export -p web
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Fix asset paths for GitHub Pages
        run: |
          python3 -c "
          content = open('dist/index.html').read()
          content = content.replace('src='/_expo/', 'src='/life-compass/_expo/')
          content = content.replace('href='/favicon', 'href='/life-compass/favicon')
          open('dist/index.html','w').write(content)
          print('Patched')
          "

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
